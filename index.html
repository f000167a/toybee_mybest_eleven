<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>toybee マイベストイレブン</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:linear-gradient(175deg,#0c1220 0%,#162033 40%,#1a1a2e 100%);font-family:'Helvetica Neue','Hiragino Kaku Gothic ProN',sans-serif;color:#e2e8f0}
button{cursor:pointer;font-family:inherit}
button:hover:not(:disabled){filter:brightness(1.15)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,215,0,0.2);border-radius:2px}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(255,215,0,0.9);color:#0c1220;padding:8px 20px;border-radius:20px;font-size:14px;font-weight:700;z-index:100;display:none}
.header{text-align:center;padding:32px 16px 18px}
.header-sub{font-size:12px;letter-spacing:4px;color:#FFD700;opacity:0.7}
.header h1{font-size:28px;font-weight:900;margin:4px 0 0;background:linear-gradient(135deg,#FFD700,#FFA500);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.pos-btns{display:flex;gap:8px;justify-content:center;padding:0 12px 14px}
.pos-btn{flex:1;max-width:84px;padding:12px 4px;border-radius:10px;text-align:center;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08)}
.pos-btn.active{background:var(–lc-bg);border:2px solid var(–lc)}
.pos-btn .label{font-size:16px;font-weight:900;color:#94a3b8;letter-spacing:1px}
.pos-btn.active .label{color:var(–lc)}
.pos-btn .count{font-size:12px;color:#475569;margin-top:3px}
.pos-btn .count.full{color:#22c55e}

.list-box{margin:0 12px 14px;background:rgba(0,0,0,0.2);border-radius:12px;border:1px solid rgba(255,255,255,0.06);padding:12px}
.list-header{font-size:13px;color:#64748b;margin-bottom:8px;text-align:center}
.list-empty{text-align:center;padding:18px 0;font-size:14px;color:#334155}
.list-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,0.03);border-radius:8px;margin-bottom:4px}
.list-item .pos-tag{font-size:11px;font-weight:800;width:28px;text-align:center;flex-shrink:0;border-radius:4px;padding:3px 0}
.list-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.list-item .song-name{font-size:15px;color:#e2e8f0;flex:1;line-height:1.3}
.list-item .rm-btn{background:none;border:none;color:#ef4444;font-size:14px;padding:2px 6px;font-weight:700;flex-shrink:0}
.list-ctrls{display:flex;gap:8px;justify-content:center;margin-top:12px}
.btn-reset{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);border-radius:8px;padding:9px 16px;color:#ef4444;font-size:13px;font-weight:700}
.btn-go{background:linear-gradient(135deg,#FFD700,#FFA500);border:none;border-radius:8px;padding:10px 24px;color:#0c1220;font-size:15px;font-weight:800;display:none}

.picker{margin:0 12px 16px;background:rgba(0,0,0,0.3);border-radius:12px;overflow:hidden;display:none}
.picker-head{padding:12px 14px 10px;border-bottom:1px solid rgba(255,255,255,0.06)}
.picker-title{font-size:15px;font-weight:700}
.picker-filters{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}
.filter-btn{padding:4px 10px;border-radius:12px;font-size:11px;font-weight:600;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#94a3b8}
.filter-btn.active{background:rgba(255,215,0,0.2);border:1px solid rgba(255,215,0,0.4);color:#FFD700}
.picker-songs{max-height:300px;overflow-y:auto;padding:8px 10px 10px}
.song-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;margin-bottom:3px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid transparent;text-align:left}
.song-btn:disabled{opacity:0.3;cursor:default}
.song-btn .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.song-btn .name{font-size:15px;color:#e2e8f0;flex:1}
.song-btn .status{font-size:13px}

.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.88);z-index:50;display:none;align-items:center;justify-content:center;padding:12px}
.modal{background:linear-gradient(180deg,#1a472a 0%,#165c2e 50%,#1a472a 100%);border-radius:16px;border:2px solid rgba(255,255,255,0.15);padding:24px 14px;max-width:400px;width:100%;max-height:90vh;overflow-y:auto;position:relative}
.modal .field-line{position:absolute;top:48%;left:14px;right:14px;height:1px;background:rgba(255,255,255,0.08)}
.modal .field-circle{position:absolute;top:48%;left:50%;transform:translate(-50%,-50%);width:48px;height:48px;border-radius:50%;border:1px solid rgba(255,255,255,0.06)}
.modal-header{text-align:center;margin-bottom:22px;position:relative}
.modal-header .sub{font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:3px}
.modal-header h2{font-size:20px;font-weight:900;margin:2px 0;color:#FFD700}
.modal-header .fm{font-size:13px;color:rgba(255,255,255,0.4)}
.fm-row{margin-bottom:22px;position:relative}
.fm-row .row-label{text-align:center;font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:2px;margin-bottom:10px}
.fm-row .row-items{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
.fm-item{text-align:center}
.fm-ball{width:38px;height:38px;border-radius:50%;margin:0 auto 5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;border:2px solid rgba(255,255,255,0.3)}
.fm-item .song{font-size:10px;color:#fff;font-weight:700;line-height:1.3;text-shadow:0 1px 4px rgba(0,0,0,0.8);word-break:break-all}

.share-box{position:relative;margin-top:18px}
.share-guide{background:rgba(0,0,0,0.3);border-radius:10px;padding:14px 16px;margin-bottom:14px;border:1px solid rgba(255,215,0,0.1)}
.share-guide .title{font-size:13px;color:#FFD700;font-weight:700;margin-bottom:8px}
.share-guide .steps{font-size:13px;color:#94a3b8;line-height:1.9}
.share-btns{display:flex;gap:8px;justify-content:center}
.btn-copy{border-radius:8px;padding:12px 20px;font-size:14px;font-weight:700;background:rgba(255,215,0,0.15);border:1px solid rgba(255,215,0,0.3);color:#FFD700}
.btn-copy.done{background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.4);color:#22c55e}
.btn-x{background:#000;border:1px solid #444;border-radius:8px;padding:12px 20px;color:#fff;font-size:14px;font-weight:700}
.btn-close{display:block;margin:16px auto 0;background:none;border:none;color:rgba(255,255,255,0.3);font-size:13px}

.footer{text-align:center;padding:20px 16px 28px;font-size:13px;color:#6b7280;line-height:1.8}
.footer a{color:#6b7280}
</style>

</head>
<body>

<canvas id="cvs" style="display:none"></canvas>

<div class="toast" id="toast"></div>

<div class="header">
  <div class="header-sub">🐝 TOYBEE</div>
  <h1>マイベストイレブン</h1>
</div>

<div class="pos-btns" id="posBtns"></div>

<div class="list-box">
  <div class="list-header" id="listHeader">⚽ 0/11</div>
  <div id="listBody"><div class="list-empty">↑ ポジションを選んで曲を追加</div></div>
  <div class="list-ctrls">
    <button class="btn-reset" id="btnReset" style="display:none" onclick="resetAll()">リセット</button>
    <button class="btn-go" id="btnGo" onclick="showResult()">⚽ ベスト11を見る！</button>
  </div>
</div>

<div class="picker" id="picker">
  <div class="picker-head">
    <div class="picker-title" id="pickerTitle"></div>
    <div class="picker-filters" id="pickerFilters"></div>
  </div>
  <div class="picker-songs" id="pickerSongs"></div>
</div>

<div class="modal-bg" id="modalBg" onclick="closeResult()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="field-line"></div>
    <div class="field-circle"></div>
    <div class="modal-header">
      <div class="sub">🐝⚽ TOYBEE</div>
      <h2>マイベストイレブン</h2>
      <div class="fm" id="modalFm"></div>
    </div>
    <div id="modalRows"></div>
    <div class="share-box">
      <div class="share-guide">
        <div class="title">Xでシェアする方法</div>
        <div class="steps" id="shareSteps">
          <span id="step1">① 「画像をコピー」を押す</span><br>
          ② 「Xを開く」を押す<br>
          ③ 投稿画面で画像をペーストして投稿
        </div>
      </div>
      <div class="share-btns">
        <button class="btn-copy" id="btnCopy" onclick="copyImage()">🖼️ 画像をコピー</button>
        <button class="btn-x" onclick="openX()">𝕏 を開く</button>
      </div>
    </div>
    <button class="btn-close" onclick="closeResult()">閉じる</button>
  </div>
</div>

<div class="footer">
  ※ 非公式のファンサイトです。toybee公式・関係者への本サイトに関するお問い合わせはご遠慮ください。<br>
  作成：エフゼロ（<a href="https://x.com/inaken816" target="_blank" rel="noopener">X</a> / <a href="mailto:f000167a@yahoo.co.jp">メール</a>）
</div>

<script>
var ALBUMS=[
  {name:"THE EARLY TOYBEE",color:"#DC2626",songs:["全米は泣かない","それゆけ!夢みるゾンビーズ!!","Flight Music","電脳ヴィジランテ","黎明グッドルーザー","あらしのよるに","いなせ","あほんだらいふ"]},
  {name:"REVIVAL",color:"#92400E",songs:["惑星ダブリス","Super Imagination","ワンタイムラヴァー","風知らぬひと","フロムアンダーランド","Teenage Black","シーラカンスと文学"]},
  {name:"LOOKBACK TO THE FUTURE",color:"#E8E8E8",songs:["LOOKBACK","Golden Age","ステルオンナ","道化師のラブソング","ライド・アンド・ライブ","S.Y.S -Save Your Souls-","TO THE FUTURE"]},
  {name:"TOYROCK INVASION",color:"#EAB308",songs:["TOY ROCK -TOYBEEのテーマ-","シモキタ・モーニング・ブルース","CAT GIRL","Jonnie's Rock'n'Roll Lamp","Playlist in your Heart"]},
  {name:"Singles",color:"#EC4899",songs:["ひとつだけ","ハナマル"]}
];
var ALL_SONGS=ALBUMS.flatMap(function(a){return a.songs.map(function(s){return{title:s,album:a.name,color:a.color}})});
var LINES=[{key:"GK",label:"GK",max:1},{key:"DF",label:"DF",max:5},{key:"MF",label:"MF",max:5},{key:"FW",label:"FW",max:5}];
var LC={GK:"#22c55e",DF:"#3b82f6",MF:"#a855f7",FW:"#ef4444"};

var fm={GK:[],DF:[],MF:[],FW:[]};
var sel=null;
var flt="all";
var copied=false;
var toastTimer=null;

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function getInfo(t){return ALL_SONGS.find(function(s){return s.title===t})}
function getTotal(){return fm.GK.length+fm.DF.length+fm.MF.length+fm.FW.length}
function getAllSel(){var s=new Set();Object.values(fm).forEach(function(arr){arr.forEach(function(t){s.add(t)})});return s}
function getFmStr(){return fm.DF.length+"-"+fm.MF.length+"-"+fm.FW.length}

function showToast(msg){
  var el=document.getElementById("toast");
  el.textContent=msg;el.style.display="block";
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){el.style.display="none"},2200);
}

function renderPosBtns(){
  var wrap=document.getElementById("posBtns");
  wrap.innerHTML="";
  LINES.forEach(function(l){
    var active=sel===l.key;
    var full=fm[l.key].length>=l.max;
    var btn=document.createElement("button");
    btn.className="pos-btn"+(active?" active":"");
    if(active){btn.style.setProperty("--lc",LC[l.key]);btn.style.setProperty("--lc-bg",LC[l.key]+"20")}
    btn.innerHTML='<div class="label">'+l.label+'</div><div class="count'+(full?" full":"")+'">'+fm[l.key].length+'/'+l.max+'</div>';
    btn.onclick=function(){sel=(sel===l.key)?null:l.key;render()};
    wrap.appendChild(btn);
  });
}

function renderList(){
  var total=getTotal();
  document.getElementById("listHeader").textContent="⚽ "+total+"/11";
  var body=document.getElementById("listBody");
  body.innerHTML="";
  if(total===0){body.innerHTML='<div class="list-empty">↑ ポジションを選んで曲を追加</div>';
  }else{
    LINES.forEach(function(l){
      fm[l.key].forEach(function(title,idx){
        var si=getInfo(title);
        var div=document.createElement("div");
        div.className="list-item";
        div.style.borderLeft="3px solid "+LC[l.key];
        div.innerHTML='<span class="pos-tag" style="color:'+LC[l.key]+';background:'+LC[l.key]+'15">'+l.label+'</span>'
          +'<span class="dot" style="background:'+(si?si.color:"#fff")+'"></span>'
          +'<span class="song-name">'+esc(title)+'</span>'
          +'<button class="rm-btn" data-lk="'+l.key+'" data-idx="'+idx+'">✕</button>';
        div.querySelector(".rm-btn").onclick=function(){fm[l.key].splice(idx,1);render()};
        body.appendChild(div);
      });
    });
  }
  document.getElementById("btnReset").style.display=total>0?"inline-block":"none";
  document.getElementById("btnGo").style.display=total===11?"inline-block":"none";
}

function renderPicker(){
  var picker=document.getElementById("picker");
  if(!sel){picker.style.display="none";return}
  picker.style.display="block";
  picker.style.border="1px solid "+LC[sel]+"30";
  document.getElementById("pickerTitle").textContent=sel+"に入れる曲を選択";
  document.getElementById("pickerTitle").style.color=LC[sel];

  var filtersDiv=document.getElementById("pickerFilters");
  filtersDiv.innerHTML="";
  var allBtn=document.createElement("button");
  allBtn.className="filter-btn"+(flt==="all"?" active":"");
  allBtn.textContent="ALL";
  allBtn.style.fontSize="12px";allBtn.style.padding="4px 12px";
  allBtn.onclick=function(){flt="all";renderPicker()};
  filtersDiv.appendChild(allBtn);
  ALBUMS.forEach(function(a){
    var b=document.createElement("button");
    b.className="filter-btn"+(flt===a.name?" active":"");
    b.textContent=a.name.length>14?a.name.slice(0,12)+"..":a.name;
    if(flt===a.name){b.style.background=a.color+"20";b.style.borderColor=a.color+"60";b.style.color=a.color}
    b.onclick=function(){flt=a.name;renderPicker()};
    filtersDiv.appendChild(b);
  });

  var songsDiv=document.getElementById("pickerSongs");
  songsDiv.innerHTML="";
  var allSelected=getAllSel();
  var filtered=flt==="all"?ALL_SONGS:ALL_SONGS.filter(function(s){return s.album===flt});
  filtered.forEach(function(s){
    var used=allSelected.has(s.title);
    var btn=document.createElement("button");
    btn.className="song-btn";
    btn.disabled=used;
    btn.innerHTML='<span class="dot" style="background:'+s.color+'"></span>'
      +'<span class="name">'+esc(s.title)+'</span>'
      +'<span class="status" style="color:'+(used?"#475569":LC[sel])+'">'+(used?"✔":"+")+'</span>';
    btn.onclick=function(){if(!used)addSong(s.title)};
    songsDiv.appendChild(btn);
  });
}

function addSong(title){
  if(!sel)return;
  var line=LINES.find(function(l){return l.key===sel});
  if(fm[sel].length>=line.max){showToast(sel+"は最大"+line.max+"曲");return}
  if(getAllSel().has(title)){showToast("選択済み");return}
  if(getTotal()>=11){showToast("11曲まで！");return}
  fm[sel].push(title);
  showToast(title+" → "+sel);
  render();
}

function resetAll(){
  fm={GK:[],DF:[],MF:[],FW:[]};
  sel=null;copied=false;
  closeResult();
  showToast("リセット");
  render();
}

function render(){
  renderPosBtns();
  renderList();
  renderPicker();
}

function showResult(){
  copied=false;
  document.getElementById("btnCopy").className="btn-copy";
  document.getElementById("btnCopy").textContent="🖼️ 画像をコピー";
  document.getElementById("step1").style.color="#e2e8f0";
  document.getElementById("step1").textContent='① 「画像をコピー」を押す';

  document.getElementById("modalFm").textContent=getFmStr();
  var rows=document.getElementById("modalRows");
  rows.innerHTML="";
  var rev=[LINES[3],LINES[2],LINES[1],LINES[0]];
  rev.forEach(function(l){
    var songs=fm[l.key];
    if(songs.length===0)return;
    var div=document.createElement("div");
    div.className="fm-row";
    var w=l.key==="GK"?100:Math.min(80,320/songs.length);
    var items=songs.map(function(title){
      var si=getInfo(title);
      var col=si?si.color:"#FFD700";
      var txtCol=col==="#E8E8E8"?"#333":"#0c1220";
      return '<div class="fm-item" style="width:'+w+'px">'
        +'<div class="fm-ball" style="background:'+col+';color:'+txtCol+';box-shadow:0 2px 10px '+col+'40">'+l.label+'</div>'
        +'<div class="song">'+esc(title)+'</div></div>';
    }).join("");
    div.innerHTML='<div class="row-label">'+l.label+'</div><div class="row-items">'+items+'</div>';
    rows.appendChild(div);
  });
  document.getElementById("modalBg").style.display="flex";
  setTimeout(drawImage,100);
}

function closeResult(){document.getElementById("modalBg").style.display="none"}

function drawImage(){
  var canvas=document.getElementById("cvs");
  var W=800,H=1000,dpr=2;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+"px";canvas.style.height=H+"px";
  var ctx=canvas.getContext("2d");
  ctx.scale(dpr,dpr);

  var grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,"#1a472a");grad.addColorStop(0.5,"#1e6b35");grad.addColorStop(1,"#1a472a");
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);

  ctx.strokeStyle="rgba(255,255,255,0.1)";ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(40,H/2);ctx.lineTo(W-40,H/2);ctx.stroke();
  ctx.beginPath();ctx.arc(W/2,H/2,50,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.rect(W*0.25,0,W*0.5,60);ctx.stroke();
  ctx.beginPath();ctx.rect(W*0.25,H-60,W*0.5,60);ctx.stroke();

  ctx.fillStyle="rgba(255,255,255,0.5)";ctx.font="bold 14px sans-serif";ctx.textAlign="center";
  ctx.fillText("\u{1F41D}\u26BD TOYBEE",W/2,36);
  ctx.fillStyle="#FFD700";ctx.font="bold 24px sans-serif";
  ctx.fillText("\u30DE\u30A4\u30D9\u30B9\u30C8\u30A4\u30EC\u30D6\u30F3",W/2,66);
  ctx.fillStyle="rgba(255,255,255,0.4)";ctx.font="14px sans-serif";
  ctx.fillText(getFmStr(),W/2,88);

  var rev=[LINES[3],LINES[2],LINES[1],LINES[0]];
  var rowYs=[140,330,540,760];
  rev.forEach(function(line,ri){
    var songs=fm[line.key];
    if(songs.length===0)return;
    var y=rowYs[ri];
    ctx.fillStyle="rgba(255,255,255,0.25)";ctx.font="bold 12px sans-serif";
    ctx.textAlign="center";ctx.fillText(line.label,W/2,y-30);
    var spacing=Math.min(140,(W-80)/songs.length);
    var startX=W/2-(songs.length-1)*spacing/2;
    songs.forEach(function(title,si){
      var x=startX+si*spacing;
      var sInfo=getInfo(title);
      var col=sInfo?sInfo.color:"#FFD700";
      ctx.beginPath();ctx.arc(x,y,24,0,Math.PI*2);
      ctx.fillStyle=col;ctx.fill();
      ctx.strokeStyle="rgba(255,255,255,0.4)";ctx.lineWidth=2;ctx.stroke();
      ctx.fillStyle=col==="#E8E8E8"?"#333":"#0c1220";
      ctx.font="bold 12px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillText(line.label,x,y);
      ctx.fillStyle="#fff";ctx.font="bold 12px sans-serif";ctx.textBaseline="top";
      var maxW=spacing-10;
      if(ctx.measureText(title).width>maxW){
        var mid=Math.floor(title.length/2);
        for(var i=mid;i>0;i--){if("\u30FB -!".indexOf(title[i])>=0){mid=i;break}}
        ctx.fillText(title.slice(0,mid),x,y+30);
        ctx.fillText(title.slice(mid),x,y+46);
      }else{ctx.fillText(title,x,y+30)}
      ctx.textBaseline="alphabetic";
    });
  });

  ctx.fillStyle="rgba(255,255,255,0.2)";ctx.font="11px sans-serif";ctx.textAlign="center";
  ctx.fillText("#toybee\u30DE\u30A4\u30D9\u30B9\u30C811",W/2,H-30);
  ctx.fillText("\u26A0\uFE0F \u30D5\u30A1\u30F3\u306B\u3088\u308B\u975E\u516C\u5F0F\u4F01\u753B\u3067\u3059",W/2,H-14);
}

async function copyImage(){
  drawImage();
  var canvas=document.getElementById("cvs");
  try{
    var blob=await new Promise(function(r){canvas.toBlob(r,"image/png")});
    await navigator.clipboard.write([new ClipboardItem({"image/png":blob})]);
    markCopied();
    showToast("画像をコピーしました！");
  }catch(e){
    var url=canvas.toDataURL("image/png");
    var a=document.createElement("a");a.href=url;a.download="toybee-best11.png";a.click();
    markCopied();
    showToast("画像を保存しました！");
  }
}

}
