<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>toybee マイベストイレブン</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:linear-gradient(175deg,#0c1220 0%,#162033 40%,#1a1a2e 100%);font-family:'Helvetica Neue','Hiragino Kaku Gothic ProN',sans-serif;color:#e2e8f0}
button{cursor:pointer;font-family:inherit}
button:hover:not(:disabled){filter:brightness(1.15)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,215,0,0.2);border-radius:2px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(255,215,0,0.9);color:#0c1220;padding:10px 24px;border-radius:20px;font-size:16px;font-weight:700;z-index:100;display:none;max-width:90%}
.header{text-align:center;padding:36px 16px 12px}
.header-sub{font-size:28px;letter-spacing:4px;color:#FFD700;opacity:0.7}
.header h1{font-size:28px;font-weight:900;margin:6px 0 0;background:linear-gradient(135deg,#FFD700,#FFA500);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.how-to{max-width:400px;margin:0 auto;padding:10px 20px 20px;text-align:center;font-size:14px;color:#94a3b8;line-height:1.9}
.how-to strong{color:#cbd5e1}
.pos-btns{display:flex;gap:10px;justify-content:center;padding:0 16px 16px}
.pos-btn{flex:1;max-width:90px;padding:14px 4px;border-radius:12px;text-align:center;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08)}
.pos-btn.active{background:var(--lc-bg);border:2px solid var(--lc)}
.pos-btn .label{font-size:18px;font-weight:900;color:#94a3b8;letter-spacing:1px}
.pos-btn.active .label{color:var(--lc)}
.pos-btn .count{font-size:14px;color:#64748b;margin-top:4px}
.pos-btn .count.full{color:#22c55e}
.list-box{margin:0 16px 16px;background:rgba(0,0,0,0.2);border-radius:14px;border:1px solid rgba(255,255,255,0.08);padding:14px}
.list-header{font-size:15px;color:#94a3b8;margin-bottom:10px;text-align:center}
.list-empty{text-align:center;padding:20px 0;font-size:16px;color:#64748b}
.list-item{display:flex;align-items:center;gap:8px;padding:10px 10px;background:rgba(255,255,255,0.03);border-radius:10px;margin-bottom:5px}
.list-item .pos-tag{font-size:13px;font-weight:800;width:32px;text-align:center;flex-shrink:0;border-radius:5px;padding:4px 0}
.list-item .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.list-item .song-name{font-size:17px;color:#f1f5f9;flex:1;line-height:1.3}
.list-item .move-btns{display:flex;flex-direction:column;gap:1px;flex-shrink:0}
.list-item .move-btn{background:none;border:none;color:#64748b;font-size:12px;padding:1px 4px;line-height:1}
.list-item .move-btn:disabled{opacity:0.2;cursor:default}
.list-item .rm-btn{background:none;border:none;color:#ef4444;font-size:16px;padding:4px 6px;font-weight:700;flex-shrink:0}
.list-ctrls{display:flex;gap:10px;justify-content:center;margin-top:14px}
.btn-reset{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);border-radius:10px;padding:10px 18px;color:#ef4444;font-size:15px;font-weight:700}
.btn-go{background:linear-gradient(135deg,#FFD700,#FFA500);border:none;border-radius:10px;padding:12px 28px;color:#0c1220;font-size:17px;font-weight:800;display:none}
.picker{margin:0 16px 20px;background:rgba(0,0,0,0.3);border-radius:14px;overflow:hidden;display:none}
.picker-head{padding:14px 16px 12px;border-bottom:1px solid rgba(255,255,255,0.06)}
.picker-title{font-size:17px;font-weight:700}
.picker-filters{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
.filter-btn{padding:6px 12px;border-radius:14px;font-size:13px;font-weight:600;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#94a3b8;white-space:nowrap}
.filter-btn.active{background:rgba(255,215,0,0.2);border:1px solid rgba(255,215,0,0.4);color:#FFD700}
.picker-songs{max-height:340px;overflow-y:auto;padding:10px 12px 12px}
.song-btn{display:flex;align-items:center;gap:12px;width:100%;padding:12px 14px;margin-bottom:4px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid transparent;text-align:left}
.song-btn:disabled{opacity:0.3;cursor:default}
.song-btn .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.song-btn .name{font-size:17px;color:#f1f5f9;flex:1}
.song-btn .status{font-size:15px}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.88);z-index:50;display:none;align-items:center;justify-content:center;padding:12px}
.modal{background:linear-gradient(180deg,#1a472a 0%,#165c2e 50%,#1a472a 100%);border-radius:18px;border:2px solid rgba(255,255,255,0.15);padding:26px 12px;max-width:420px;width:100%;max-height:90vh;overflow-y:auto;position:relative}
.modal-header{text-align:center;margin-bottom:8px;position:relative}
.modal-header .sub{font-size:12px;color:rgba(255,255,255,0.5);letter-spacing:3px}
.modal-header h2{font-size:22px;font-weight:900;margin:4px 0;color:#FFD700}
.modal-header .fm{font-size:15px;color:rgba(255,255,255,0.4)}
/* Halfway line in modal */
.modal-midline{height:1px;background:rgba(255,255,255,0.15);margin:10px 0 16px;position:relative}
.modal-midline::after{content:"";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,0.1)}
.fm-row{margin-bottom:20px;position:relative}
.fm-row .row-items{display:flex;justify-content:center;gap:4px;flex-wrap:nowrap}
.fm-item{text-align:center;width:60px;flex-shrink:0}
.fm-item.solo{width:80px}
.fm-ball{width:36px;height:36px;border-radius:50%;margin:0 auto 4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;border:2px solid rgba(255,255,255,0.3)}
.fm-item .song{font-size:10px;color:#fff;font-weight:700;line-height:1.3;text-shadow:0 1px 4px rgba(0,0,0,0.8);word-break:break-all}
/* Penalty area in modal */
.modal-penalty{border:1px solid rgba(255,255,255,0.1);border-bottom:none;margin:12px auto 0;width:50%;padding:16px 0 0;display:flex;justify-content:center;position:relative}
.modal-penalty::before{content:"";position:absolute;top:-25px;left:50%;transform:translateX(-50%);width:60px;height:30px;border:1px solid rgba(255,255,255,0.1);border-bottom:none;border-radius:60px 60px 0 0}
.share-box{position:relative;margin-top:20px}
.share-guide{background:rgba(0,0,0,0.3);border-radius:12px;padding:16px 18px;margin-bottom:16px;border:1px solid rgba(255,215,0,0.1)}
.share-guide .title{font-size:15px;color:#FFD700;font-weight:700;margin-bottom:10px}
.share-guide .steps{font-size:15px;color:#cbd5e1;line-height:2}
.share-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-share{border-radius:10px;padding:14px 22px;font-size:16px;font-weight:700;background:rgba(255,215,0,0.15);border:1px solid rgba(255,215,0,0.3);color:#FFD700}
.btn-share.done{background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.4);color:#22c55e}
.btn-x{background:#000;border:1px solid #444;border-radius:10px;padding:14px 22px;color:#fff;font-size:16px;font-weight:700}
.btn-close{display:block;margin:18px auto 0;background:none;border:none;color:rgba(255,255,255,0.35);font-size:15px}
.save-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);z-index:60;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.save-overlay.show{display:flex}
.save-overlay .hint{color:#FFD700;font-size:16px;font-weight:700;margin-bottom:16px;text-align:center}
.save-overlay img{max-width:90%;max-height:70vh;border-radius:12px;border:2px solid rgba(255,255,255,0.15)}
.save-overlay .close-save{margin-top:16px;background:none;border:1px solid rgba(255,255,255,0.2);border-radius:10px;padding:10px 20px;color:#94a3b8;font-size:14px}
.footer{text-align:center;padding:24px 16px 32px;font-size:14px;color:#6b7280;line-height:1.8}
.footer a{color:#6b7280}
</style>
</head>
<body>
<canvas id="cvs" style="display:none"></canvas>
<div class="toast" id="toast"></div>
<div class="header">
  <div class="header-sub">🐝 TOYBEE</div>
  <h1>マイベストイレブン</h1>
</div>
<div class="how-to">
  <strong>GK・DF・MF・FW</strong>を選んで曲を配置しよう（各最大5曲、計11曲）<br>
  ▲▼で同ポジション内の並べ替えができます<br>
  完成画像では、同ポジションの曲が<strong>左から順</strong>に並びます
</div>
<div class="list-box">
  <div class="list-header" id="listHeader">⚽ 0/11</div>
  <div id="listBody"><div class="list-empty">↓ ポジションを選んで曲を追加</div></div>
  <div class="list-ctrls">
    <button class="btn-reset" id="btnReset" style="display:none" onclick="resetAll()">リセット</button>
    <button class="btn-go" id="btnGo" onclick="showResult()">⚽ ベスト11を見る！</button>
  </div>
</div>
<div class="pos-btns" id="posBtns"></div>
<div class="picker" id="picker">
  <div class="picker-head">
    <div class="picker-title" id="pickerTitle"></div>
    <div class="picker-filters" id="pickerFilters"></div>
  </div>
  <div class="picker-songs" id="pickerSongs"></div>
</div>
<div class="modal-bg" id="modalBg" onclick="closeResult()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="sub">🐝⚽ TOYBEE</div>
      <h2>マイベストイレブン</h2>
      <div class="fm" id="modalFm"></div>
    </div>
    <div id="modalRows"></div>
    <div class="share-box">
      <div class="share-guide">
        <div class="title">Xでシェアする方法</div>
        <div class="steps">
          <span id="step1">① 下のボタンで画像をコピー・保存</span><br>
          ② 「Xを開く」を押す<br>
          ③ 投稿画面で画像を添付して投稿
        </div>
      </div>
      <div class="share-btns">
        <button class="btn-share" id="btnShare" onclick="shareOrSave()">🖼️ 画像をコピー・保存</button>
        <button class="btn-x" onclick="openX()">𝕏 を開く</button>
      </div>
    </div>
    <button class="btn-close" onclick="closeResult()">閉じる</button>
  </div>
</div>
<div class="save-overlay" id="saveOverlay">
  <div class="hint">画像を長押しして保存してください</div>
  <img id="saveImg" src="" alt="toybee best 11">
  <button class="close-save" onclick="closeSave()">閉じる</button>
</div>
<div class="footer">
  ※ 非公式のファンサイトです。toybee公式・関係者への本サイトに関するお問い合わせはご遠慮ください。<br>
  作成：エフゼロ（<a href="https://x.com/inaken816" target="_blank" rel="noopener">X</a> / <a href="/cdn-cgi/l/email-protection#1a7c2a2a2a2b2c2d7b5a637b72757534797534706a">メール</a>）
</div>
<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
var ALBUMS=[
  {name:"THE EARLY TOYBEE",color:"#DC2626",songs:["全米は泣かない","それゆけ!夢みるゾンビーズ!!","Flight Music","電脳ヴィジランテ","黎明グッドルーザー","あらしのよるに","いなせ","あほんだらいふ"]},
  {name:"REVIVAL",color:"#92400E",songs:["惑星ダブリス","Super Imagination","ワンタイムラヴァー","風知らぬひと","フロムアンダーランド","Teenage Black","シーラカンスと文学"]},
  {name:"LOOKBACK TO THE FUTURE",color:"#E8E8E8",songs:["LOOKBACK","Golden Age","ステルオンナ","道化師のラブソング","ライド・アンド・ライブ","S.Y.S -Save Your Souls-","TO THE FUTURE"]},
  {name:"TOYROCK INVASION",color:"#EAB308",songs:["TOY ROCK -TOYBEEのテーマ-","シモキタ・モーニング・ブルース","CAT GIRL","Jonnie's Rock'n'Roll Lamp","Playlist in your Heart"]},
  {name:"Singles",color:"#EC4899",songs:["ひとつだけ","ハナマル"]}
];
var ALL_SONGS=ALBUMS.flatMap(function(a){return a.songs.map(function(s){return{title:s,album:a.name,color:a.color}})});
var LINES=[{key:"GK",label:"GK",max:1},{key:"DF",label:"DF",max:5},{key:"MF",label:"MF",max:5},{key:"FW",label:"FW",max:5}];
var LC={GK:"#22c55e",DF:"#3b82f6",MF:"#a855f7",FW:"#ef4444"};
var fm={GK:[],DF:[],MF:[],FW:[]};
var sel=null,flt="all",toastTimer=null;

function esc(s){return String(s).replace(/&/g,”&”).replace(/</g,”<”).replace(/>/g,”>”).replace(/”/g,”"”)}
function getInfo(t){return ALL_SONGS.find(function(s){return s.title===t})}
function getTotal(){return fm.GK.length+fm.DF.length+fm.MF.length+fm.FW.length}
function getAllSel(){var s=new Set();Object.values(fm).forEach(function(a){a.forEach(function(t){s.add(t)})});return s}
function getFmStr(){return fm.DF.length+”-”+fm.MF.length+”-”+fm.FW.length}
function showToast(msg){var el=document.getElementById(“toast”);el.textContent=msg;el.style.display=“block”;clearTimeout(toastTimer);toastTimer=setTimeout(function(){el.style.display=“none”},2200)}
function swapSong(lk,idx,dir){var a=fm[lk],n=idx+dir;if(n<0||n>=a.length)return;var t=a[idx];a[idx]=a[n];a[n]=t;render()}

function renderPosBtns(){
var w=document.getElementById(“posBtns”);w.innerHTML=””;
LINES.forEach(function(l){
var act=sel===l.key,full=fm[l.key].length>=l.max,b=document.createElement(“button”);
b.className=“pos-btn”+(act?” active”:””);
if(act){b.style.setProperty(”–lc”,LC[l.key]);b.style.setProperty(”–lc-bg”,LC[l.key]+“20”)}
b.innerHTML=’<div class="label">’+l.label+’</div><div class=“count’+(full?” full”:””)+’”>’+fm[l.key].length+’/’+l.max+’</div>’;
b.onclick=function(){sel=(sel===l.key)?null:l.key;render()};w.appendChild(b);
});
}
function renderList(){
var total=getTotal();document.getElementById(“listHeader”).textContent=“⚽ “+total+”/11”;
var body=document.getElementById(“listBody”);body.innerHTML=””;
if(total===0){body.innerHTML=’<div class="list-empty">↓ ポジションを選んで曲を追加</div>’;}
else{LINES.forEach(function(l){var len=fm[l.key].length;fm[l.key].forEach(function(title,idx){
var si=getInfo(title),div=document.createElement(“div”);div.className=“list-item”;div.style.borderLeft=“3px solid “+LC[l.key];
var ud=len>1?’<div class="move-btns"><button class=“move-btn”’+(idx===0?” disabled”:””)+’>▲</button><button class=“move-btn”’+(idx===len-1?” disabled”:””)+’>▼</button></div>’:””;
div.innerHTML=’<span class="pos-tag" style="color:'+LC[l.key]+';background:'+LC[l.key]+'15">’+l.label+’</span><span class=“dot” style=“background:’+(si?si.color:”#fff”)+’”></span><span class="song-name">’+esc(title)+’</span>’+ud+’<button class="rm-btn">✕</button>’;
var mb=div.querySelectorAll(”.move-btn”);if(mb.length===2){(function(k,i){mb[0].onclick=function(){swapSong(k,i,-1)};mb[1].onclick=function(){swapSong(k,i,1)}})(l.key,idx)}
(function(k,i){div.querySelector(”.rm-btn”).onclick=function(){fm[k].splice(i,1);render()}})(l.key,idx);body.appendChild(div);});})}
document.getElementById(“btnReset”).style.display=total>0?“inline-block”:“none”;
var gkOk=fm.GK.length===1;
document.getElementById(“btnGo”).style.display=(total===11&&gkOk)?“inline-block”:“none”;
}
function renderPicker(){
var pk=document.getElementById(“picker”);if(!sel){pk.style.display=“none”;return}
pk.style.display=“block”;pk.style.border=“1px solid “+LC[sel]+“30”;
document.getElementById(“pickerTitle”).textContent=sel+“に入れる曲を選択”;document.getElementById(“pickerTitle”).style.color=LC[sel];
var fd=document.getElementById(“pickerFilters”);fd.innerHTML=””;
var ab=document.createElement(“button”);ab.className=“filter-btn”+(flt===“all”?” active”:””);ab.textContent=“ALL”;ab.onclick=function(){flt=“all”;renderPicker()};fd.appendChild(ab);
ALBUMS.forEach(function(a){var b=document.createElement(“button”);b.className=“filter-btn”+(flt===a.name?” active”:””);b.textContent=a.name;if(flt===a.name){b.style.background=a.color+“20”;b.style.borderColor=a.color+“60”;b.style.color=a.color}b.onclick=function(){flt=a.name;renderPicker()};fd.appendChild(b)});
var sd=document.getElementById(“pickerSongs”);sd.innerHTML=””;var as=getAllSel();
var fi=flt===“all”?ALL_SONGS:ALL_SONGS.filter(function(s){return s.album===flt});
fi.forEach(function(s){var u=as.has(s.title),b=document.createElement(“button”);b.className=“song-btn”;b.disabled=u;
b.innerHTML=’<span class="dot" style="background:'+s.color+'"></span><span class="name">’+esc(s.title)+’</span><span class=“status” style=“color:’+(u?”#64748b”:LC[sel])+’”>’+(u?“✔”:”+”)+’</span>’;
b.onclick=function(){if(!u)addSong(s.title)};sd.appendChild(b)});
}
function addSong(t){if(!sel)return;var l=LINES.find(function(x){return x.key===sel});if(fm[sel].length>=l.max){showToast(sel+“は最大”+l.max+“曲”);return}if(getAllSel().has(t)){showToast(“選択済み”);return}if(getTotal()>=11){showToast(“11曲まで！”);return}fm[sel].push(t);showToast(t+” → “+sel);var sy=window.scrollY;render();window.scrollTo(0,sy+52);
var tot=getTotal();if(tot>=10&&fm.GK.length===0){setTimeout(function(){showToast(“GKを1曲選んでください”);sel=“GK”;render();document.getElementById(“picker”).scrollIntoView({behavior:“smooth”})},1200)}}
function resetAll(){fm={GK:[],DF:[],MF:[],FW:[]};sel=null;closeResult();showToast(“リセット”);render()}

function render(){var sy=window.scrollY;renderPosBtns();renderList();renderPicker();window.scrollTo(0,sy)}

function showResult(){
document.getElementById(“btnShare”).className=“btn-share”;
document.getElementById(“btnShare”).textContent=“🖼️ 画像をコピー・保存”;
document.getElementById(“step1”).style.color=”#f1f5f9”;
document.getElementById(“step1”).textContent=‘① 下のボタンで画像をコピー・保存’;
document.getElementById(“modalFm”).textContent=getFmStr();
var rows=document.getElementById(“modalRows”);rows.innerHTML=””;
// Order: FW, then midline, then MF, DF, penalty+GK
var order=[{key:“FW”},{mid:true},{key:“MF”},{key:“DF”},{penalty:true,key:“GK”}];
order.forEach(function(o){
if(o.mid){var ml=document.createElement(“div”);ml.className=“modal-midline”;rows.appendChild(ml);return}
var songs=fm[o.key];if(songs.length===0)return;
if(o.penalty){
// Penalty area wrapper
var pa=document.createElement(“div”);pa.className=“modal-penalty”;
var line=LINES.find(function(x){return x.key===o.key});
var items=songs.map(function(t){var si=getInfo(t),col=si?si.color:”#FFD700”,tc=col===”#E8E8E8”?”#333”:”#0c1220”;
return ‘<div class="fm-item solo"><div class="fm-ball" style="background:'+col+';color:'+tc+';box-shadow:0 2px 10px '+col+'40">’+line.label+’</div><div class="song">’+esc(t)+’</div></div>’;}).join(””);
pa.innerHTML=’<div class="row-items">’+items+’</div>’;rows.appendChild(pa);return;
}
var div=document.createElement(“div”);div.className=“fm-row”;
var line=LINES.find(function(x){return x.key===o.key});
var items=songs.map(function(t){var si=getInfo(t),col=si?si.color:”#FFD700”,tc=col===”#E8E8E8”?”#333”:”#0c1220”,cls=songs.length===1?“fm-item solo”:“fm-item”;
return ‘<div class="'+cls+'"><div class="fm-ball" style="background:'+col+';color:'+tc+';box-shadow:0 2px 10px '+col+'40">’+line.label+’</div><div class="song">’+esc(t)+’</div></div>’;}).join(””);
div.innerHTML=’<div class="row-items">’+items+’</div>’;rows.appendChild(div);
});
document.getElementById(“modalBg”).style.display=“flex”;setTimeout(drawImage,100);
}
function closeResult(){document.getElementById(“modalBg”).style.display=“none”}

function drawImage(){
var canvas=document.getElementById(“cvs”),W=1000,H=1200,dpr=2;
canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+“px”;canvas.style.height=H+“px”;
var ctx=canvas.getContext(“2d”);ctx.scale(dpr,dpr);
// Field bg
var grad=ctx.createLinearGradient(0,0,0,H);
grad.addColorStop(0,”#1a6b33”);grad.addColorStop(0.5,”#1e7a3a”);grad.addColorStop(1,”#1a472a”);
ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
// Title area (darker top)
var tg=ctx.createLinearGradient(0,0,0,130);tg.addColorStop(0,“rgba(0,0,0,0.4)”);tg.addColorStop(1,“rgba(0,0,0,0)”);
ctx.fillStyle=tg;ctx.fillRect(0,0,W,130);

// Title
ctx.fillStyle=“rgba(255,255,255,0.6)”;ctx.font=“bold 26px sans-serif”;ctx.textAlign=“center”;
ctx.fillText(”\u{1F41D}\u26BD TOYBEE”,W/2,34);
ctx.fillStyle=”#FFD700”;ctx.font=“bold 26px sans-serif”;
ctx.fillText(”\u30DE\u30A4\u30D9\u30B9\u30C8\u30A4\u30EC\u30D6\u30F3”,W/2,68);
ctx.fillStyle=“rgba(255,255,255,0.4)”;ctx.font=“16px sans-serif”;
ctx.fillText(getFmStr(),W/2,94);

// Halfway line + circle (above FW)
var midY=160;
ctx.strokeStyle=“rgba(255,255,255,0.2)”;ctx.lineWidth=1.5;
ctx.beginPath();ctx.moveTo(30,midY);ctx.lineTo(W-30,midY);ctx.stroke();
ctx.beginPath();ctx.arc(W/2,midY,50,0,Math.PI*2);ctx.stroke();

// Penalty area (bottom, for GK)
var paTop=960,paW=380,paH=190;
ctx.strokeStyle=“rgba(255,255,255,0.15)”;ctx.lineWidth=1;
ctx.beginPath();ctx.rect((W-paW)/2,paTop,paW,paH);ctx.stroke();
// Goal area
var gaW=180,gaH=60;
ctx.beginPath();ctx.rect((W-gaW)/2,paTop+paH-gaH,gaW,gaH);ctx.stroke();
// Penalty arc (D shape above penalty area)
var arcR=70,arcCy=paTop+45;
var arcAngle=Math.asin(45/arcR);
ctx.beginPath();ctx.arc(W/2,arcCy,arcR,Math.PI+arcAngle,-arcAngle,false);ctx.stroke();

// Player positions: FW→MF→DF→GK (top to bottom, all in own half)
var rowYs={FW:270,MF:500,DF:740,GK:1050};
var lineOrder=[“FW”,“MF”,“DF”,“GK”];

lineOrder.forEach(function(key){
var songs=fm[key];if(songs.length===0)return;
var y=rowYs[key];
var line=LINES.find(function(x){return x.key===key});
var spacing=Math.min(165,(W-120)/songs.length);
var startX=W/2-(songs.length-1)*spacing/2;
songs.forEach(function(title,si){
var x=startX+si*spacing;
var sInfo=getInfo(title);var col=sInfo?sInfo.color:”#FFD700”;
// Shadow
ctx.beginPath();ctx.arc(x,y+3,34,0,Math.PI*2);ctx.fillStyle=“rgba(0,0,0,0.3)”;ctx.fill();
// Ball
ctx.beginPath();ctx.arc(x,y,32,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();
ctx.strokeStyle=“rgba(255,255,255,0.4)”;ctx.lineWidth=2.5;ctx.stroke();
// Label
ctx.fillStyle=col===”#E8E8E8”?”#333”:”#0c1220”;
ctx.font=“bold 18px sans-serif”;ctx.textAlign=“center”;ctx.textBaseline=“middle”;
ctx.fillText(line.label,x,y);
// Song name - up to 3 lines
ctx.fillStyle=”#fff”;ctx.font=“bold 22px sans-serif”;ctx.textBaseline=“top”;
var maxW=spacing-8;
var lines=[];
if(ctx.measureText(title).width<=maxW){lines=[title]}
else{
var remain=title;
while(remain.length>0&&lines.length<3){
if(ctx.measureText(remain).width<=maxW){lines.push(remain);remain=””;break}
var cut=remain.length;
for(var ci=1;ci<=remain.length;ci++){if(ctx.measureText(remain.slice(0,ci)).width>maxW){cut=ci-1;break}}
var best=cut;
for(var cj=cut;cj>Math.floor(cut/2);cj–){if(”\u30FB -!”.indexOf(remain[cj])>=0){best=cj+1;break}}
if(best===cut)best=cut;
lines.push(remain.slice(0,best));remain=remain.slice(best);
}
if(remain.length>0&&lines.length>0)lines[lines.length-1]+=remain;
}
var lineH=26;var startY=y+36;
lines.forEach(function(ln,li){ctx.fillText(ln,x,startY+li*lineH)});
ctx.textBaseline=“alphabetic”;
});
});

// no footer text in image
}
